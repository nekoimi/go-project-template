server:
  port: "8081"
  mode: debug

database:
  host: localhost
  port: "5432"
  user: postgres
  password: postgres
  dbname: go_template_test
  sslmode: disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 10

jwt:
  secret: "test-secret"
  expire_hours: 1

scheduler:
  enabled: false
  timezone: "Asia/Shanghai"

websocket:
  enabled: false
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_period: 60s
  write_wait: 10s
  read_wait: 60s
  max_message_size: 5120

storage:
  driver: "local"
  base_url: "http://localhost:8081/uploads"
  local:
    upload_dir: "./test-uploads"
    max_file_size: 5
  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "go-template-test"
    use_ssl: false
    public_url: "http://localhost:9000"
